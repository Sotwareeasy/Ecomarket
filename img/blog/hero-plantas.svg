<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustración de un jardín con plantas nativas, flores silvestres y una abeja polinizando">
  <rect width="800" height="600" fill="#cfe8cb"/>
  <circle cx="660" cy="100" r="70" fill="#e6c068" opacity="0.9"/>
  <rect x="0" y="380" width="800" height="220" fill="#a9d19a"/>
  <path d="M0 380 Q200 340 400 385 Q600 430 800 375 L800 420 L0 420 Z" fill="#8fc47f"/>

  <!-- colinas de fondo -->
  <path d="M0 300 Q150 250 300 300 Q450 350 600 290 Q700 260 800 300 L800 420 L0 420 Z" fill="#7fb96e" opacity="0.7"/>

  <!-- flores silvestres -->
  <g transform="translate(150,420)">
    <line x1="0" y1="0" x2="0" y2="-90" stroke="#1f5a38" stroke-width="5"/>
    <circle cx="0" cy="-100" r="10" fill="#e6c068"/>
    <g fill="#ffffff">
      <ellipse cx="0" cy="-122" rx="9" ry="16"/>
      <ellipse cx="0" cy="-122" rx="9" ry="16" transform="rotate(60 0 -100)"/>
      <ellipse cx="0" cy="-122" rx="9" ry="16" transform="rotate(120 0 -100)"/>
      <ellipse cx="0" cy="-122" rx="9" ry="16" transform="rotate(180 0 -100)"/>
      <ellipse cx="0" cy="-122" rx="9" ry="16" transform="rotate(240 0 -100)"/>
      <ellipse cx="0" cy="-122" rx="9" ry="16" transform="rotate(300 0 -100)"/>
    </g>
    <circle cx="0" cy="-100" r="9" fill="#e6c068"/>
  </g>

  <g transform="translate(230,440) scale(0.8)">
    <line x1="0" y1="0" x2="0" y2="-90" stroke="#1f5a38" stroke-width="5"/>
    <g fill="#fbfaf3">
      <ellipse cx="0" cy="-122" rx="9" ry="16"/>
      <ellipse cx="0" cy="-122" rx="9" ry="16" transform="rotate(72 0 -100)"/>
      <ellipse cx="0" cy="-122" rx="9" ry="16" transform="rotate(144 0 -100)"/>
      <ellipse cx="0" cy="-122" rx="9" ry="16" transform="rotate(216 0 -100)"/>
      <ellipse cx="0" cy="-122" rx="9" ry="16" transform="rotate(288 0 -100)"/>
    </g>
    <circle cx="0" cy="-100" r="9" fill="#e6c068"/>
  </g>

  <!-- flor grande central con abeja -->
  <g transform="translate(400,460)">
    <line x1="0" y1="0" x2="0" y2="-140" stroke="#1f5a38" stroke-width="7"/>
    <path d="M0 -70 Q-40 -90 -30 -60 Q-10 -50 0 -70" fill="#27ae60"/>
    <g fill="#ffffff" stroke="#cfe8cb" stroke-width="2">
      <ellipse cx="0" cy="-172" rx="15" ry="26"/>
      <ellipse cx="0" cy="-172" rx="15" ry="26" transform="rotate(51 0 -140)"/>
      <ellipse cx="0" cy="-172" rx="15" ry="26" transform="rotate(102 0 -140)"/>
      <ellipse cx="0" cy="-172" rx="15" ry="26" transform="rotate(153 0 -140)"/>
      <ellipse cx="0" cy="-172" rx="15" ry="26" transform="rotate(204 0 -140)"/>
      <ellipse cx="0" cy="-172" rx="15" ry="26" transform="rotate(255 0 -140)"/>
      <ellipse cx="0" cy="-172" rx="15" ry="26" transform="rotate(306 0 -140)"/>
    </g>
    <circle cx="0" cy="-140" r="15" fill="#e6c068"/>

    <!-- abeja -->
    <g transform="translate(48,-160) rotate(-15)">
      <ellipse cx="0" cy="0" rx="14" ry="10" fill="#14231c"/>
      <path d="M-14 0 h28" stroke="#e6c068" stroke-width="4"/>
      <ellipse cx="-6" cy="-10" rx="10" ry="8" fill="#ffffff" opacity="0.8"/>
      <ellipse cx="6" cy="-10" rx="10" ry="8" fill="#ffffff" opacity="0.8"/>
    </g>
  </g>

  <!-- pastos -->
  <g stroke="#1f5a38" stroke-width="4" stroke-linecap="round">
    <path d="M60 420 q10 -40 0 -60" fill="none"/>
    <path d="M80 420 q-6 -35 6 -55" fill="none"/>
    <path d="M600 420 q10 -45 -4 -65" fill="none"/>
    <path d="M630 420 q-8 -30 6 -50" fill="none"/>
    <path d="M700 420 q12 -40 0 -60" fill="none"/>
  </g>
</svg>
