<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustración de un armario sostenible con prendas colgadas de tonos tierra">
  <rect width="800" height="600" fill="#f5f5dc"/>
  <rect x="0" y="0" width="800" height="600" fill="#fbfaf3" opacity="0.4"/>

  <!-- riel -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#1f5a38" stroke-width="10" stroke-linecap="round"/>
  <circle cx="60" cy="120" r="14" fill="#1f5a38"/>
  <circle cx="740" cy="120" r="14" fill="#1f5a38"/>

  <!-- ganchos + prendas -->
  <g>
    <!-- prenda 1: abrigo -->
    <path d="M150 120 v18 l-18 10 v10" stroke="#8a6538" stroke-width="5" fill="none"/>
    <path d="M100 150 L150 120 L200 150 L215 170 L185 190 L165 175 L165 320 Q150 335 135 320 L135 175 L115 190 L85 170 Z" fill="#cba064"/>
    <rect x="146" y="150" width="8" height="160" fill="#8a6538" opacity="0.5"/>

    <!-- prenda 2: sueter verde -->
    <path d="M300 120 v18 l-16 8 v8" stroke="#8a6538" stroke-width="5" fill="none"/>
    <path d="M255 148 L300 122 L345 148 L358 168 L332 184 L316 172 L316 290 Q300 302 284 290 L284 172 L268 184 L242 168 Z" fill="#27ae60"/>

    <!-- prenda 3: vestido arena -->
    <path d="M450 120 v18 l-14 8 v8" stroke="#8a6538" stroke-width="5" fill="none"/>
    <path d="M410 148 L450 122 L490 148 L500 165 L478 178 L470 170 L482 340 Q450 358 418 340 L430 170 L422 178 L400 165 Z" fill="#e6c068"/>

    <!-- prenda 4: camisa blanca -->
    <path d="M600 120 v18 l-14 8 v8" stroke="#8a6538" stroke-width="5" fill="none"/>
    <path d="M562 150 L600 124 L638 150 L650 168 L628 182 L616 172 L616 270 Q600 282 584 270 L584 172 L572 182 L550 168 Z" fill="#ffffff" stroke="#cfe8cb" stroke-width="3"/>
  </g>

  <!-- planta decorativa -->
  <g transform="translate(680,420)">
    <rect x="0" y="40" width="60" height="55" rx="8" fill="#cba064"/>
    <path d="M30 40 C10 15 8 -20 30 -45 C52 -20 50 15 30 40 Z" fill="#2ecc71"/>
    <path d="M30 40 C45 15 55 0 68 -12" stroke="#27ae60" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M30 40 C15 15 5 0 -8 -12" stroke="#27ae60" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>

  <!-- suelo -->
  <rect x="0" y="470" width="800" height="130" fill="#cfe8cb" opacity="0.6"/>
</svg>
