<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustración de una cocina zero waste con frascos reutilizables, una bolsa de tela y una cesta de mimbre">
  <rect width="800" height="600" fill="#f5f5dc"/>
  <rect width="800" height="600" fill="#fbfaf3" opacity="0.5"/>

  <!-- pared -->
  <rect x="0" y="0" width="800" height="380" fill="#e8ecda"/>
  <!-- mesada -->
  <rect x="0" y="380" width="800" height="220" fill="#cfe8cb"/>
  <rect x="0" y="380" width="800" height="14" fill="#1f5a38"/>

  <!-- ventana -->
  <rect x="560" y="60" width="180" height="220" rx="10" fill="#fbfaf3" stroke="#1f5a38" stroke-width="6"/>
  <line x1="650" y1="60" x2="650" y2="280" stroke="#1f5a38" stroke-width="6"/>
  <line x1="560" y1="170" x2="740" y2="170" stroke="#1f5a38" stroke-width="6"/>
  <circle cx="600" cy="120" r="26" fill="#2ecc71" opacity="0.85"/>
  <path d="M690 230 q20 -60 40 -20 q10 30 -10 40 q-30 10 -30 -20 z" fill="#27ae60"/>

  <!-- cesta de mimbre -->
  <g transform="translate(90,400)">
    <path d="M0 40 L170 40 L150 150 Q85 175 20 150 Z" fill="#cba064"/>
    <path d="M0 40 L170 40 L162 66 L8 66 Z" fill="#b5895a"/>
    <path d="M20 66 L20 150 M50 66 L46 152 M85 66 L85 156 M120 66 L124 152 M150 66 L150 150" stroke="#8a6538" stroke-width="3" fill="none" opacity="0.6"/>
    <!-- botellas dentro de la cesta -->
    <rect x="30" y="-70" width="26" height="120" rx="10" fill="#ffffff" stroke="#1f5a38" stroke-width="4"/>
    <rect x="30" y="-84" width="26" height="18" rx="6" fill="#27ae60"/>
    <rect x="70" y="-50" width="24" height="100" rx="9" fill="#ffffff" stroke="#1f5a38" stroke-width="4"/>
    <rect x="70" y="-62" width="24" height="16" rx="5" fill="#e6c068"/>
    <rect x="112" y="-60" width="24" height="110" rx="9" fill="#ffffff" stroke="#1f5a38" stroke-width="4"/>
    <rect x="112" y="-72" width="24" height="16" rx="5" fill="#27ae60"/>
  </g>

  <!-- frascos de vidrio con granos -->
  <g transform="translate(330,430)">
    <rect x="0" y="0" width="90" height="110" rx="14" fill="#ffffff" fill-opacity="0.55" stroke="#1f5a38" stroke-width="5"/>
    <rect x="8" y="55" width="74" height="47" fill="#cba064"/>
    <rect x="18" y="-16" width="54" height="20" rx="6" fill="#1f5a38"/>
  </g>
  <g transform="translate(440,410)">
    <rect x="0" y="0" width="80" height="130" rx="14" fill="#ffffff" fill-opacity="0.55" stroke="#1f5a38" stroke-width="5"/>
    <rect x="8" y="70" width="64" height="52" fill="#7a8b3f"/>
    <rect x="16" y="-16" width="48" height="20" rx="6" fill="#1f5a38"/>
  </g>

  <!-- bolsa de tela -->
  <g transform="translate(560,410)">
    <path d="M0 40 Q0 0 40 0 Q80 0 80 40 L88 150 Q40 168 -8 150 Z" fill="#e6c068"/>
    <path d="M15 40 Q15 -20 40 -20 Q65 -20 65 40" fill="none" stroke="#8a6538" stroke-width="6"/>
    <circle cx="40" cy="95" r="16" fill="none" stroke="#fbfaf3" stroke-width="4"/>
    <path d="M28 95 l8 8 l16 -18" stroke="#fbfaf3" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- planta pequena -->
  <g transform="translate(230,455)">
    <rect x="0" y="30" width="46" height="40" rx="6" fill="#cba064"/>
    <path d="M23 30 C10 10 8 -15 23 -30 C38 -15 36 10 23 30 Z" fill="#27ae60"/>
    <path d="M23 30 C34 12 44 0 55 -8" stroke="#27ae60" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
